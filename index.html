<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SCaD</title>

<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#111111">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SCaD">
<link rel="apple-touch-icon" href="/icons/icon-192.png">

<meta name="description" content="SCaD • Instala la app y entra a tu plataforma e-learning."/>

<style>

:root{
--bg:#0b0b0c;
--card:rgba(255,255,255,.06);
--border:rgba(255,255,255,.12);
--text:#ffffff;
--muted:rgba(255,255,255,.72);
--shadow:0 18px 55px rgba(0,0,0,.45);
--radius:26px;
}

*{box-sizing:border-box;}

html,body{
height:100%;
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
background:
radial-gradient(1200px 600px at 50% -10%,rgba(255,255,255,.14),transparent 55%),
radial-gradient(900px 500px at 10% 10%,rgba(255,255,255,.10),transparent 60%),
var(--bg);
color:var(--text);
}

.wrap{
min-height:100%;
display:flex;
align-items:center;
justify-content:center;
padding:22px;
}

.card{
width:min(560px,94vw);
background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.03));
border:1px solid rgba(255,255,255,.08);
border-radius:var(--radius);
box-shadow:0 25px 80px rgba(0,0,0,.55);
padding:28px;
position:relative;
overflow:hidden;
}

.glow{
position:absolute;
inset:-120px -140px auto -140px;
height:200px;
background:radial-gradient(circle at 50% 50%,rgba(255,255,255,.14),transparent 62%);
filter:blur(6px);
pointer-events:none;
}

.brand{
display:flex;
align-items:center;
gap:14px;
}

.logo{
width:56px;
height:56px;
border-radius:18px;
background:rgba(255,255,255,.10);
border:1px solid rgba(255,255,255,.14);
display:grid;
place-items:center;
overflow:hidden;
}

.logo img{
width:100%;
height:100%;
object-fit:contain;
}

h1{
font-size:24px;
margin:0;
}

#subtitle{
font-size:13.5px;
color:rgba(255,255,255,.70);
margin-top:6px;
}

.msg{
position:relative;
margin-top:18px;
padding:14px;
border-radius:18px;
border:1px solid rgba(255,255,255,.12);
background:rgba(255,255,255,.06);
font-size:13px;
}

.pill{
display:inline-block;
padding:6px 10px;
border-radius:999px;
font-size:12px;
font-weight:800;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.12);
margin-bottom:8px;
}

.helpVideo{
position:absolute;
right:12px;
top:12px;
width:32px;
height:32px;
border-radius:50%;
display:grid;
place-items:center;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.14);
color:#fff;
text-decoration:none;
}

.actions{
margin-top:18px;
display:flex;
gap:12px;
flex-wrap:wrap;
}

.btn{
border:none;
border-radius:999px;
height:48px;
padding:0 18px;
font-weight:800;
cursor:pointer;
display:inline-flex;
align-items:center;
justify-content:center;
gap:10px;
min-width:220px;
}

.installBtn{
background:#fff;
color:#111;
}

.primary{
background:transparent;
color:#fff;
border:1px solid rgba(255,255,255,.16);
}

.row{
margin-top:12px;
}

.hint{
font-size:12px;
color:rgba(255,255,255,.65);
}

.hidden{display:none!important;}

@media (max-width:520px){
.btn{width:100%;}
}

</style>
</head>

<body>

<div class="wrap">

<div class="card">

<div class="glow"></div>

<div class="brand">
<div class="logo">
<img src="/icons/icon-192.png">
</div>

<div>
<h1>SCaD</h1>
<p id="subtitle">Acceso rápido a tu plataforma.</p>
</div>
</div>

<div class="msg">

<div class="pill" id="pill">Estado</div>

<div id="msgBody">
Si tu navegador lo permite, verás el botón <b>Instalar App SCaD</b>.
</div>

<a id="helpVideo" class="helpVideo hidden"
href="https://app.scad.mx/tutorial-ios/"
target="_blank">▶</a>

</div>

<div class="actions">

<button class="btn installBtn hidden" id="installBtn">
Instalar App SCaD
</button>

<button class="btn primary" id="enterBtn">
Entrar a SCaD →
</button>

</div>

<div class="row">
<p class="hint" id="installHint"></p>
</div>

</div>
</div>

<script>

const TARGET_URL="https://www.scad.mx/e-learning";

const ua=navigator.userAgent||"";

const isIOS=/iPad|iPhone|iPod/.test(ua)||(navigator.platform==="MacIntel"&&navigator.maxTouchPoints>1);

const isSafari=/^((?!chrome|android).)*safari/i.test(ua);

const isStandalone=(window.matchMedia("(display-mode: standalone)").matches)||window.navigator.standalone===true;

const installBtn=document.getElementById("installBtn");
const enterBtn=document.getElementById("enterBtn");
const msgBody=document.getElementById("msgBody");
const pill=document.getElementById("pill");
const helpVideo=document.getElementById("helpVideo");
const installHint=document.getElementById("installHint");

if(isStandalone){

pill.textContent="Instalada";

msgBody.innerHTML="SCaD ya está instalada en tu dispositivo.";

installBtn.classList.add("hidden");

}

else if(isIOS){

pill.textContent="Instalación manual";

msgBody.innerHTML="Safari → Compartir → Añadir a pantalla de inicio";

helpVideo.classList.remove("hidden");

}

else{

pill.textContent="Instalable";

msgBody.innerHTML="Si tu navegador lo permite, puedes instalar la app con el botón.";

}

if("serviceWorker" in navigator){

window.addEventListener("load",()=>{

navigator.serviceWorker.register("/sw.js");

});

}

let deferredPrompt=null;

window.addEventListener("beforeinstallprompt",(e)=>{

e.preventDefault();

deferredPrompt=e;

if(!isIOS&&!isStandalone){

installBtn.classList.remove("hidden");

installHint.textContent="Puedes instalar SCaD en este dispositivo.";

}

});

installBtn.addEventListener("click",async()=>{

if(!deferredPrompt)return;

deferredPrompt.prompt();

const choice=await deferredPrompt.userChoice;

if(choice.outcome==="accepted"){

installHint.textContent="Instalando SCaD…";

}else{

installHint.textContent="Instalación cancelada.";

}

});

enterBtn.addEventListener("click",()=>{

if(isStandalone){

window.location.href=TARGET_URL;

return;

}

const w=window.open(TARGET_URL,"_blank");

if(!w)window.location.href=TARGET_URL;

});

</script>

</body>
</html>
