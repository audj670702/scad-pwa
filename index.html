<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0b0b0c" />
  <title>SCaD</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <style>
    :root{
      --bg:#060607;
      --card:rgba(255,255,255,.08);
      --card2:rgba(255,255,255,.06);
      --border:rgba(255,255,255,.14);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.72);
      --muted2:rgba(255,255,255,.55);
      --btn:#ffffff;
      --btnText:#0b0b0c;
      --btn2:rgba(255,255,255,.10);
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color:var(--text);
      background:
        radial-gradient(1200px 700px at 30% 20%, rgba(255,255,255,.10), transparent 55%),
        radial-gradient(900px 500px at 70% 35%, rgba(255,255,255,.07), transparent 60%),
        var(--bg);
      display:flex; align-items:center; justify-content:center;
      padding:24px;
    }
    .card{
      width:min(980px, 100%);
      border-radius:28px;
      background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.06));
      border:1px solid var(--border);
      box-shadow: 0 30px 80px rgba(0,0,0,.55);
      padding:28px;
    }
    .top{
      display:flex; gap:16px; align-items:center;
      padding-bottom:14px;
    }
    .logoWrap{
      width:64px; height:64px; border-radius:18px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      display:flex; align-items:center; justify-content:center;
      overflow:hidden;
    }
    .logoWrap img{width:46px; height:46px; object-fit:contain}
    h1{margin:0; font-size:40px; letter-spacing:.2px}
    .subtitle{margin:2px 0 0 0; color:var(--muted); font-size:18px}

    .hint{
      margin-top:12px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.10);
      padding:14px 16px;
      border-radius:16px;
      color:var(--muted);
      font-size:16px;
      line-height:1.35;
    }

    .actions{
      display:flex; gap:14px; flex-wrap:wrap;
      margin-top:18px;
      align-items:center;
    }
    a.btn, button.btn{
      border:0;
      border-radius:999px;
      padding:16px 22px;
      font-size:18px;
      font-weight:700;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex; align-items:center; justify-content:center;
      gap:10px;
      user-select:none;
    }
    .primary{ background:var(--btn); color:var(--btnText); }
    .secondary{ background:var(--btn2); color:var(--text); border:1px solid rgba(255,255,255,.16); }
    .ghost{
      background:transparent; color:var(--muted2);
      border:1px solid rgba(255,255,255,.12);
      padding:12px 16px;
      font-weight:600;
      font-size:16px;
    }

    .row{
      display:flex; align-items:center; gap:12px; flex-wrap:wrap;
      margin-top:10px;
    }
    .small{font-size:14px; color:var(--muted2); margin-top:10px}

    /* Ocultos por defecto */
    #installBtn{ display:none; }
    #iosHelp{ display:none; }
  </style>
</head>

<body>
  <main class="card">
    <div class="top">
      <div class="logoWrap" aria-hidden="true">
        <!-- Pon aquí tu icono 192 o 512 -->
        <img src="/icons/icon-192.png" alt="SCaD" />
      </div>
      <div>
        <h1>SCaD</h1>
        <p class="subtitle">Acceso rápido a tu plataforma.</p>
      </div>
    </div>

    <!-- Mensaje mínimo dinámico -->
    <div id="hint" class="hint">Cargando…</div>

    <div class="actions">
      <!-- Botón instalación (solo aparece si aplica) -->
      <button id="installBtn" class="btn primary" type="button">Instalar SCaD</button>

      <!-- CTA principal (siempre visible) -->
      <a class="btn secondary" href="https://www.scad.mx/e-learning" rel="noopener">Entrar a la plataforma →</a>

      <!-- Opcional: abrir en navegador (mismo link, por claridad) -->
      <a class="btn ghost" href="https://www.scad.mx/e-learning" rel="noopener">Abrir en navegador</a>
    </div>

    <!-- iOS: instrucciones cortas -->
    <div id="iosHelp" class="row">
      <span class="small">
        En iPhone/iPad (Safari): <strong>Compartir</strong> → <strong>Añadir a pantalla de inicio</strong>.
      </span>
    </div>
  </main>

  <script>
    // ======= CONFIG =======
    const PLATFORM_URL = "https://www.scad.mx/e-learning";

    // ======= HELPERS =======
    const isIOS = () => {
      const ua = navigator.userAgent || "";
      const iOS = /iPad|iPhone|iPod/.test(ua);
      // iPadOS 13+ se reporta como Mac; detecta touch
      const iPadOS = (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
      return iOS || iPadOS;
    };

    const hintEl = document.getElementById("hint");
    const installBtn = document.getElementById("installBtn");
    const iosHelp = document.getElementById("iosHelp");

    // ======= SERVICE WORKER =======
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      });
    }

    // ======= UI LOGIC =======
    let deferredPrompt = null;

    // iOS: no beforeinstallprompt, instalación manual
    if (isIOS()) {
      hintEl.textContent = "En iPhone/iPad la instalación es manual (Safari).";
      iosHelp.style.display = "flex";
    } else {
      hintEl.textContent = "Si tu navegador lo permite, podrás instalar SCaD aquí.";
    }

    // Android / Desktop: captura el evento de instalación
    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;

      // Mostrar sólo cuando realmente está disponible
      installBtn.style.display = "inline-flex";
      hintEl.textContent = "Listo. Puedes instalar SCaD con un toque.";
    });

    installBtn.addEventListener("click", async () => {
      if (!deferredPrompt) return;

      // Muestra el prompt nativo
      deferredPrompt.prompt();

      // Espera el resultado
      try {
        const { outcome } = await deferredPrompt.userChoice;
        deferredPrompt = null;

        // Oculta botón si el usuario ya resolvió
        installBtn.style.display = "none";

        // Mensaje mínimo post-acción
        hintEl.textContent = (outcome === "accepted")
          ? "Instalación iniciada. Abre SCaD desde tu dispositivo."
          : "Instalación cancelada. Puedes entrar a la plataforma.";
      } catch {
        // Silencioso
      }
    });

    // Si ya está instalada (standalone), puedes llevarlo directo al portal si quieres:
    // (NO redirigimos automático por tu instrucción)
    // const isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;
  </script>
</body>
</html>
