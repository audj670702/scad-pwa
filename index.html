<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0b0b0c" />
  <title>SCaD</title>

  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <style>
    :root{
      --bg:#060607;
      --card:rgba(255,255,255,.08);
      --border:rgba(255,255,255,.14);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.70);
      --btn:#ffffff;
      --btnText:#0b0b0c;
      --btn2:rgba(255,255,255,.10);
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color:var(--text);
      background:
        radial-gradient(1200px 700px at 30% 20%, rgba(255,255,255,.10), transparent 55%),
        radial-gradient(900px 500px at 70% 35%, rgba(255,255,255,.07), transparent 60%),
        var(--bg);
      display:flex; align-items:center; justify-content:center;
      padding:24px;
    }
    .card{
      width:min(980px, 100%);
      border-radius:28px;
      background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.06));
      border:1px solid var(--border);
      box-shadow: 0 30px 80px rgba(0,0,0,.55);
      padding:28px;
    }
    .top{display:flex; gap:16px; align-items:center;}
    .logoWrap{
      width:64px; height:64px; border-radius:18px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      display:flex; align-items:center; justify-content:center;
      overflow:hidden;
    }
    .logoWrap img{width:46px; height:46px; object-fit:contain}
    h1{margin:0; font-size:40px;}
    .subtitle{margin:2px 0 0 0; color:var(--muted); font-size:18px}

    .actions{display:flex; gap:14px; flex-wrap:wrap; margin-top:18px; align-items:center;}
    button.btn, a.btn{
      border:0; border-radius:999px;
      padding:16px 22px;
      font-size:18px;
      font-weight:800;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex; align-items:center; justify-content:center;
      gap:10px;
    }
    .primary{ background:var(--btn); color:var(--btnText); }
    .secondary{ background:var(--btn2); color:var(--text); border:1px solid rgba(255,255,255,.16); }

    /* Toast */
    .toast{
      margin-top:14px;
      padding:12px 14px;
      border-radius:16px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      color:var(--muted);
      display:none;
      line-height:1.3;
    }

    /* Modal iOS */
    .backdrop{
      position:fixed; inset:0;
      background:rgba(0,0,0,.55);
      display:none; align-items:center; justify-content:center;
      padding:20px;
    }
    .modal{
      width:min(520px, 100%);
      border-radius:22px;
      background:rgba(20,20,22,.92);
      border:1px solid rgba(255,255,255,.14);
      box-shadow: 0 30px 80px rgba(0,0,0,.65);
      padding:18px 18px 16px;
    }
    .modal h2{margin:0 0 6px 0; font-size:18px}
    .modal p{margin:0; color:var(--muted); font-size:16px}
    .modal .row{display:flex; gap:10px; justify-content:flex-end; margin-top:14px;}
    .smallBtn{
      padding:10px 14px; border-radius:999px;
      font-weight:700; font-size:14px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.08);
      color:var(--text);
      cursor:pointer;
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="top">
      <div class="logoWrap">
        <img src="/icons/icon-192.png" alt="SCaD" />
      </div>
      <div>
        <h1>SCaD</h1>
        <p class="subtitle">Acceso rápido a tu plataforma.</p>
      </div>
    </div>

    <div class="actions">
      <!-- ÚNICO botón de intención -->
      <button id="installMain" class="btn primary" type="button">Instalar SCaD</button>

      <a class="btn secondary" href="https://www.scad.mx/e-learning" rel="noopener">Entrar a la plataforma →</a>
    </div>

    <div id="toast" class="toast"></div>
  </main>

  <!-- Modal iOS -->
  <div id="backdrop" class="backdrop" role="dialog" aria-modal="true">
    <div class="modal">
      <h2>Instalar en iPhone/iPad</h2>
      <p>En Safari: <strong>Compartir</strong> → <strong>Añadir a pantalla de inicio</strong>.</p>
      <div class="row">
        <button id="closeModal" class="smallBtn" type="button">Entendido</button>
      </div>
    </div>
  </div>

  <script>
    const PLATFORM_URL = "https://www.scad.mx/e-learning";

    const installMain = document.getElementById("installMain");
    const toast = document.getElementById("toast");
    const backdrop = document.getElementById("backdrop");
    const closeModal = document.getElementById("closeModal");

    let deferredPrompt = null;

    const isIOS = () => {
      const ua = navigator.userAgent || "";
      const iOS = /iPad|iPhone|iPod/.test(ua);
      const iPadOS = (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
      return iOS || iPadOS;
    };

    const showToast = (msg) => {
      toast.textContent = msg;
      toast.style.display = "block";
    };

    const showIOSModal = () => {
      backdrop.style.display = "flex";
    };

    closeModal.addEventListener("click", () => {
      backdrop.style.display = "none";
    });

    // Service Worker
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      });
    }

    // Captura disponibilidad real de instalación (Android/desktop)
    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });

    installMain.addEventListener("click", async () => {
      toast.style.display = "none";

      // iOS: solo instrucciones
      if (isIOS()) {
        showIOSModal();
        return;
      }

      // Android/Desktop: si el navegador permite, lanzamos prompt nativo
      if (deferredPrompt) {
        deferredPrompt.prompt();
        try {
          const { outcome } = await deferredPrompt.userChoice;
          deferredPrompt = null;

          if (outcome === "accepted") {
            showToast("Listo. Busca SCaD en tu pantalla de inicio o apps.");
          } else {
            showToast("Instalación cancelada. Puedes entrar a la plataforma.");
          }
        } catch {
          // silencioso
        }
        return;
      }

      // No disponible: explicación mínima y accionable
      showToast("Aquí no está disponible la instalación. Prueba en Chrome/Edge o usa “Entrar a la plataforma”.");
    });
  </script>
</body>
</html>
